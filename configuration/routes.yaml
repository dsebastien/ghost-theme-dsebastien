routes:
  /:
    template: home
  /blog/:
    template: blog
  /newsletter/:
    template: newsletter
  /news/:
    template: news
  /start/:
    template: start
  /all-articles/:
    template: all-articles
  /all-tags/:
    template: all-tags
  /feeds/:
    template: feeds

  # Custom filtered RSS feeds (channels).
  # Each channel below is BOTH a browsable archive page at its path
  # AND an RSS feed at {path}rss/ (RSS is enabled by default for channels).
  # tag:[a,b,c] matches posts having ANY of the listed tags.
  /feeds/pkm/:
    controller: channel
    filter: "tag:[personal-knowledge-management,note-taking,obsidian,zettelkasten,journaling]"
    template: feed-pkm
  /feeds/productivity/:
    controller: channel
    filter: "tag:[productivity,personal-organization,personal-development,habits,routines]"
    template: feed-productivity
  /feeds/dev/:
    controller: channel
    filter: "tag:[software-development,web-development,front-end,back-end,angular,typescript,javascript]"
    template: feed-dev
  /feeds/best/:
    controller: channel
    filter: "featured:true"
    template: feed-best

collections:
  /:
    permalink: /{slug}/
    template: index
  /blog/:
    permalink: /blog/{slug}/
    template: index
    filter: primary_tag:blog
  /newsletter/:
    permalink: /newsletter/{slug}/
    template: index
    filter: primary_tag:newsletter
  /news/:
    permalink: /news/{slug}/
    template: index
    filter: primary_tag:news
    rss: true

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
