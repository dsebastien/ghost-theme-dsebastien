routes:
  /:
    template: home
  /blog/:
    template: blog
  /newsletter/:
    template: newsletter
  /news/:
    template: news
  /start/:
    template: start
  # Five guided-path pages — one per layer of the Knowledge Master's Journey
  # (homepage-start-overhaul 2.3 / articles 3.3). Each binds a Ghost Page via
  # `data: page.start-<layer>`; the data key becomes `page` in the template
  # (see src/custom-start-pillar.hbs). This binding ALSO 301s the page's own
  # /start-<layer>/ URL to /start/<layer>/, so there's no duplicate content.
  # The prose is edited in Ghost Admin (the page body) — no redeploy to reword.
  # Order: foundation → system → practice → application → creation.
  /start/foundation/:
    data: page.start-foundation
    template: custom-start-pillar
  /start/system/:
    data: page.start-system
    template: custom-start-pillar
  /start/practice/:
    data: page.start-practice
    template: custom-start-pillar
  /start/application/:
    data: page.start-application
    template: custom-start-pillar
  /start/creation/:
    data: page.start-creation
    template: custom-start-pillar
  # Utility crawl index — a channel (not a static route) so Ghost paginates
  # natively past any {{#get}} cap and emits link[rel=next/prev] for crawlers.
  /all-articles/:
    controller: channel
    filter: "tag:blog"
    template: all-articles
    rss: false
  # "Recently refreshed" feed (Tier 1.8b). Filtered to genuine post-cutoff edits
  # (updated_at after the 2026-06 site-wide re-timestamp) so it reflects real
  # freshness, not the mass re-stamp. Keep this date in sync with the freshness.js
  # CUTOFF. rss:true -> /updated/rss/.
  /updated/:
    controller: channel
    filter: "tag:blog+updated_at:>'2026-07-01 00:00:00'"
    order: "updated_at desc"
    template: updated
    rss: true
  /tags/:
    template: tags-hub
  /series/:
    template: series
  /feeds/:
    template: feeds

  # Custom filtered RSS feeds (channels).
  # Each channel below is BOTH a browsable archive page at its path
  # AND an RSS feed at {path}rss/ (RSS is enabled by default for channels).
  # tag:[a,b,c] matches posts having ANY of the listed tags.
  # Every topical channel is scoped with +tag:blog (the articles inclusion
  # marker) so newsletters/news sharing topic tags never leak into them.
  /feeds/pkm/:
    controller: channel
    filter: "tag:[personal-knowledge-management,note-taking,obsidian,zettelkasten,journaling]+tag:blog"
    template: feed-pkm
  /feeds/ai/:
    controller: channel
    filter: "tag:[ai,ai-2,claude-code,ai-skills]+tag:blog"
    template: feed-ai
  /feeds/productivity/:
    controller: channel
    filter: "tag:[productivity,personal-organization,personal-development,habits,routines]+tag:blog"
    template: feed-productivity
  /feeds/dev/:
    controller: channel
    filter: "tag:[software-development,web-development,front-end,back-end,angular,typescript,javascript]+tag:blog"
    template: feed-dev
  /feeds/best/:
    controller: channel
    filter: "featured:true+tag:blog"
    template: feed-best

  # 7 content-pillar hubs (articles-page-overhaul Tier 2.1). Channels (NOT
  # collections — collections partition posts and the unfiltered / owns them
  # all). Each renders its own thin pillar-<slug> wrapper (NOT a `data:` tag
  # binding — internal tags are excluded from the Content API the data resolver
  # uses, which 404s the route). See src/partials/components/pillar-body.hbs.
  # Posts are assigned to pillars by the hash-pillar-* backfill (first-match
  # over topic tags; see src/data/pillars.json). Browsable page + RSS at
  # /pillars/<slug>/rss/. Internal tags stay out of /tag/ and post tag lists.
  #
  # /pillars/ index — static route linking to all 7 hubs (homepage-start-overhaul
  # 2.6 follow-up). Plain template (no channel/data binding needed — the card
  # list is hardcoded in src/pillars.hbs, kept in sync with src/data/pillars.json).
  /pillars/:
    template: pillars
  /pillars/pkm-foundations/:
    controller: channel
    filter: "tag:hash-pillar-pkm-foundations+tag:blog"
    template: pillar-pkm-foundations
    rss: true
  /pillars/tools-and-systems/:
    controller: channel
    filter: "tag:hash-pillar-tools-and-systems+tag:blog"
    template: pillar-tools-and-systems
    rss: true
  /pillars/writing-and-thinking/:
    controller: channel
    filter: "tag:hash-pillar-writing-and-thinking+tag:blog"
    template: pillar-writing-and-thinking
    rss: true
  /pillars/zen-productivity/:
    controller: channel
    filter: "tag:hash-pillar-zen-productivity+tag:blog"
    template: pillar-zen-productivity
    rss: true
  /pillars/knowledge-work/:
    controller: channel
    filter: "tag:hash-pillar-knowledge-work+tag:blog"
    template: pillar-knowledge-work
    rss: true
  /pillars/content-systems/:
    controller: channel
    filter: "tag:hash-pillar-content-systems+tag:blog"
    template: pillar-content-systems
    rss: true
  /pillars/creator-systems/:
    controller: channel
    filter: "tag:hash-pillar-creator-systems+tag:blog"
    template: pillar-creator-systems
    rss: true

# IMPORTANT: keep the /blog/, /newsletter/, /news/ collections below.
# Their {slug} permalink filters are inert — the unfiltered / collection owns
# every post, so post URLs stay /{slug}/ — but these collections generate the
# live, correctly-filtered RSS feeds at /blog/rss/, /newsletter/rss/ and
# /news/rss/, which are externally linked all over the web.
# Never delete or rename them.
collections:
  /:
    permalink: /{slug}/
    template: index
  /blog/:
    permalink: /blog/{slug}/
    template: index
    filter: primary_tag:blog
  /newsletter/:
    permalink: /newsletter/{slug}/
    template: index
    filter: primary_tag:newsletter
  /news/:
    permalink: /news/{slug}/
    template: index
    filter: primary_tag:news
    rss: true

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
